<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memoona Ishaq — Islamic Content Writer & SEO Specialist</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --forest: #1a3d2b;
    --emerald: #2d6a4f;
    --sage: #52b788;
    --mint: #b7e4c7;
    --cream: #faf8f3;
    --parchment: #f2ede3;
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --gold-pale: #f5e6b8;
    --ink: #1c1a16;
    --ink-soft: #3d3a32;
    --ink-muted: #6b6557;
    --white: #ffffff;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--ink);
    line-height: 1.7;
    overflow-x: hidden;
  }

  /* ─── NAV ─── */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 1.2rem 5%;
    background: rgba(250,248,243,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(201,168,76,0.2);
    transition: box-shadow .3s;
  }
  nav.scrolled { box-shadow: 0 2px 24px rgba(26,61,43,0.08); }

  .nav-logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.5rem;
    font-weight: 600;
    color: var(--forest);
    text-decoration: none;
    letter-spacing: .02em;
  }
  .nav-logo span { color: var(--gold); }

  .nav-links { display: flex; gap: 2.2rem; list-style: none; }
  .nav-links a {
    font-size: .85rem; font-weight: 500; letter-spacing: .06em; text-transform: uppercase;
    color: var(--ink-soft); text-decoration: none; transition: color .25s;
  }
  .nav-links a:hover { color: var(--gold); }

  .nav-cta {
    background: var(--forest); color: var(--white) !important;
    padding: .55rem 1.4rem; border-radius: 2px;
    transition: background .25s !important;
  }
  .nav-cta:hover { background: var(--gold) !important; color: var(--forest) !important; }

  /* ─── HERO ─── */
  #home {
    min-height: 100vh;
    display: grid; grid-template-columns: 1fr 1fr; align-items: center;
    padding: 8rem 5% 5rem;
    gap: 4rem;
    position: relative; overflow: hidden;
  }

  .hero-bg-pattern {
    position: absolute; inset: 0; opacity: .04;
    background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%231a3d2b' fill-opacity='1'%3E%3Cpath d='M30 0l8.66 5v10L30 20l-8.66-5V5L30 0zm0 40l8.66 5v10L30 60l-8.66-5V45L30 40z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    pointer-events: none;
  }

  .hero-accent {
    position: absolute; top: -60px; right: -60px;
    width: 420px; height: 420px; border-radius: 50%;
    background: radial-gradient(circle, rgba(201,168,76,.12) 0%, transparent 70%);
    pointer-events: none;
  }

  .hero-text { position: relative; }

  .hero-eyebrow {
    display: inline-flex; align-items: center; gap: .6rem;
    font-size: .78rem; font-weight: 500; letter-spacing: .12em; text-transform: uppercase;
    color: var(--gold); margin-bottom: 1.4rem;
  }
  .hero-eyebrow::before {
    content: ''; display: block;
    width: 32px; height: 1px; background: var(--gold);
  }

  .hero-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(3rem, 5.5vw, 5rem);
    font-weight: 300; line-height: 1.08;
    color: var(--forest); margin-bottom: .6rem;
  }
  .hero-name em { font-style: italic; color: var(--gold); }

  .hero-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.35rem; font-weight: 400; font-style: italic;
    color: var(--ink-muted); margin-bottom: 1.8rem;
  }

  .hero-desc {
    font-size: .97rem; font-weight: 300; color: var(--ink-soft);
    max-width: 500px; margin-bottom: 2.4rem; line-height: 1.8;
  }

  .hero-btns { display: flex; gap: 1rem; flex-wrap: wrap; }

  .btn-primary {
    display: inline-flex; align-items: center; gap: .5rem;
    background: var(--forest); color: var(--white);
    padding: .85rem 2rem; font-size: .88rem; font-weight: 500;
    letter-spacing: .04em; text-decoration: none; border-radius: 2px;
    transition: all .3s; border: none; cursor: pointer;
  }
  .btn-primary:hover { background: var(--gold); color: var(--forest); transform: translateY(-2px); }

  .btn-outline {
    display: inline-flex; align-items: center; gap: .5rem;
    background: transparent; color: var(--forest);
    padding: .85rem 2rem; font-size: .88rem; font-weight: 500;
    letter-spacing: .04em; text-decoration: none; border-radius: 2px;
    border: 1.5px solid var(--forest); transition: all .3s; cursor: pointer;
  }
  .btn-outline:hover { background: var(--forest); color: var(--white); transform: translateY(-2px); }

  .hero-visual {
    position: relative; display: flex; justify-content: center; align-items: center;
  }

  .hero-card {
    background: var(--white);
    border: 1px solid rgba(201,168,76,.25);
    border-radius: 4px;
    padding: 2.4rem;
    box-shadow: 0 20px 60px rgba(26,61,43,.1), 0 4px 16px rgba(201,168,76,.1);
    width: 100%; max-width: 380px;
    position: relative;
  }
  .hero-card::before {
    content: ''; position: absolute; top: 0; left: 0;
    width: 100%; height: 4px;
    background: linear-gradient(90deg, var(--forest), var(--gold));
    border-radius: 4px 4px 0 0;
  }

  .hero-avatar {
    width: 90px; height: 90px; border-radius: 50%;
    background: linear-gradient(135deg, var(--emerald), var(--forest));
    display: flex; align-items: center; justify-content: center;
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.2rem; font-weight: 600; color: var(--gold);
    margin: 0 auto 1.4rem;
    border: 3px solid var(--gold-pale);
  }

  .hero-card h3 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.4rem; font-weight: 600; text-align: center;
    color: var(--forest); margin-bottom: .3rem;
  }
  .hero-card p { text-align: center; font-size: .82rem; color: var(--ink-muted); margin-bottom: 1.6rem; }

  .hero-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; }
  .stat { text-align: center; padding: .8rem; background: var(--parchment); border-radius: 3px; }
  .stat-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.8rem; font-weight: 600; color: var(--forest); display: block;
  }
  .stat-label { font-size: .72rem; color: var(--ink-muted); letter-spacing: .05em; text-transform: uppercase; }

  .bismillah {
    text-align: center; font-size: .9rem; color: var(--gold);
    margin-top: 1.4rem; font-family: 'Cormorant Garamond', serif;
    font-style: italic; letter-spacing: .05em;
  }

  /* ─── SECTIONS ─── */
  section { padding: 6rem 5%; }
  .section-header { text-align: center; margin-bottom: 4rem; }
  .section-tag {
    display: inline-flex; align-items: center; gap: .5rem;
    font-size: .75rem; font-weight: 500; letter-spacing: .14em; text-transform: uppercase;
    color: var(--gold); margin-bottom: 1rem;
  }
  .section-tag::before, .section-tag::after {
    content: ''; display: block; width: 24px; height: 1px; background: var(--gold);
  }
  .section-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2rem, 4vw, 3rem); font-weight: 300; color: var(--forest);
    line-height: 1.2;
  }
  .section-title em { font-style: italic; color: var(--gold); }
  .section-sub { font-size: .95rem; color: var(--ink-muted); max-width: 540px; margin: 1rem auto 0; }

  /* ─── ABOUT ─── */
  #about { background: var(--white); }
  .about-grid { display: grid; grid-template-columns: 1fr 1.4fr; gap: 5rem; align-items: center; max-width: 1100px; margin: 0 auto; }

  .about-visual { position: relative; }
  .about-img-wrap {
    background: linear-gradient(145deg, var(--forest), var(--emerald));
    border-radius: 4px; padding: 3rem 2.5rem;
    text-align: center; position: relative; overflow: hidden;
  }
  .about-img-wrap::before {
    content: ''; position: absolute; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23ffffff' fill-opacity='0.05' fill-rule='evenodd'%3E%3Cpath d='M0 40L40 0H20L0 20M40 40V20L20 40'/%3E%3C/g%3E%3C/svg%3E");
  }
  .about-monogram {
    width: 120px; height: 120px; border-radius: 50%;
    background: rgba(255,255,255,.08); border: 2px solid rgba(201,168,76,.5);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Cormorant Garamond', serif;
    font-size: 3rem; font-weight: 300; color: var(--gold);
    margin: 0 auto 1.5rem; position: relative; z-index: 1;
  }
  .about-img-wrap h3 {
    font-family: 'Cormorant Garamond', serif; font-size: 1.6rem; font-weight: 400;
    color: var(--white); margin-bottom: .4rem; position: relative; z-index: 1;
  }
  .about-img-wrap p { font-size: .82rem; color: rgba(255,255,255,.65); position: relative; z-index: 1; }

  .about-badge {
    position: absolute; bottom: -1.5rem; right: -1.5rem;
    background: var(--gold); color: var(--forest);
    width: 100px; height: 100px; border-radius: 50%;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    font-size: .72rem; font-weight: 500; text-align: center; letter-spacing: .03em;
    border: 4px solid var(--cream); line-height: 1.3;
  }
  .about-badge strong { font-size: 1.4rem; display: block; font-family: 'Cormorant Garamond', serif; }

  .about-text h2 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.2rem; font-weight: 300; color: var(--forest);
    margin-bottom: 1.2rem; line-height: 1.3;
  }
  .about-text h2 em { font-style: italic; color: var(--gold); }
  .about-text p { font-size: .95rem; color: var(--ink-soft); margin-bottom: 1rem; line-height: 1.8; }

  .about-skills { display: flex; flex-wrap: wrap; gap: .6rem; margin-top: 1.8rem; }
  .skill-tag {
    padding: .45rem 1.1rem; border-radius: 2px;
    background: var(--parchment); border: 1px solid rgba(201,168,76,.3);
    font-size: .8rem; color: var(--forest); font-weight: 500;
  }

  /* ─── SERVICES ─── */
  #services { background: var(--parchment); }
  .services-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1.8rem; max-width: 1100px; margin: 0 auto; }

  .service-card {
    background: var(--white);
    border: 1px solid rgba(201,168,76,.2);
    border-radius: 4px; padding: 2.4rem;
    transition: all .3s; position: relative; overflow: hidden;
  }
  .service-card:hover { transform: translateY(-6px); box-shadow: 0 20px 50px rgba(26,61,43,.1); border-color: var(--gold); }
  .service-card::after {
    content: ''; position: absolute; bottom: 0; left: 0;
    width: 0; height: 3px; background: linear-gradient(90deg, var(--forest), var(--gold));
    transition: width .4s;
  }
  .service-card:hover::after { width: 100%; }

  .service-icon {
    width: 52px; height: 52px; border-radius: 4px;
    background: linear-gradient(135deg, rgba(26,61,43,.08), rgba(201,168,76,.12));
    display: flex; align-items: center; justify-content: center;
    font-size: 1.4rem; margin-bottom: 1.4rem;
    border: 1px solid rgba(201,168,76,.2);
  }
  .service-card h3 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.3rem; font-weight: 600; color: var(--forest); margin-bottom: .7rem;
  }
  .service-card p { font-size: .88rem; color: var(--ink-muted); line-height: 1.7; }

  /* ─── PORTFOLIO ─── */
  #portfolio { background: var(--white); }
  .portfolio-tabs { display: flex; justify-content: center; gap: .8rem; margin-bottom: 3rem; flex-wrap: wrap; }
  .tab-btn {
    padding: .55rem 1.4rem; border-radius: 2px;
    background: transparent; border: 1px solid rgba(26,61,43,.2);
    font-size: .82rem; font-weight: 500; letter-spacing: .04em;
    color: var(--ink-muted); cursor: pointer; transition: all .25s;
  }
  .tab-btn.active, .tab-btn:hover {
    background: var(--forest); color: var(--white); border-color: var(--forest);
  }

  .portfolio-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.8rem; max-width: 1100px; margin: 0 auto; }

  .portfolio-card {
    border: 1px solid rgba(201,168,76,.2); border-radius: 4px;
    overflow: hidden; transition: all .3s; background: var(--cream);
  }
  .portfolio-card:hover { transform: translateY(-5px); box-shadow: 0 16px 40px rgba(26,61,43,.1); }

  .portfolio-thumb {
    height: 180px;
    display: flex; align-items: center; justify-content: center;
    font-size: 2.5rem; position: relative; overflow: hidden;
  }
  .portfolio-thumb.green { background: linear-gradient(135deg, var(--forest), var(--emerald)); }
  .portfolio-thumb.gold  { background: linear-gradient(135deg, #7d5c1a, var(--gold)); }
  .portfolio-thumb.sage  { background: linear-gradient(135deg, var(--sage), var(--emerald)); }

  .portfolio-badge {
    position: absolute; top: 1rem; right: 1rem;
    background: rgba(255,255,255,.15); backdrop-filter: blur(6px);
    color: var(--white); font-size: .7rem; letter-spacing: .08em; text-transform: uppercase;
    padding: .3rem .7rem; border-radius: 2px; font-weight: 500;
  }

  .portfolio-body { padding: 1.6rem; }
  .portfolio-body h4 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.15rem; font-weight: 600; color: var(--forest); margin-bottom: .5rem;
  }
  .portfolio-body p { font-size: .84rem; color: var(--ink-muted); line-height: 1.6; margin-bottom: 1rem; }
  .portfolio-meta { display: flex; align-items: center; justify-content: space-between; }
  .portfolio-tag { font-size: .75rem; color: var(--gold); font-weight: 500; letter-spacing: .05em; text-transform: uppercase; }
  .portfolio-link { font-size: .8rem; color: var(--forest); text-decoration: none; font-weight: 500; transition: color .2s; }
  .portfolio-link:hover { color: var(--gold); }

  /* ─── TESTIMONIALS ─── */
  #testimonials { background: var(--forest); }
  #testimonials .section-title { color: var(--white); }
  #testimonials .section-tag { color: var(--gold-light); }
  #testimonials .section-tag::before, #testimonials .section-tag::after { background: var(--gold-light); }
  #testimonials .section-sub { color: rgba(255,255,255,.6); }

  .testimonials-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1.8rem; max-width: 1100px; margin: 0 auto; }

  .testimonial-card {
    background: rgba(255,255,255,.06); border: 1px solid rgba(201,168,76,.2);
    border-radius: 4px; padding: 2.2rem;
    transition: background .3s;
  }
  .testimonial-card:hover { background: rgba(255,255,255,.1); }

  .quote-mark { font-family: 'Cormorant Garamond', serif; font-size: 4rem; line-height: .8; color: var(--gold); opacity: .5; margin-bottom: .5rem; }
  .testimonial-text { font-size: .92rem; color: rgba(255,255,255,.8); line-height: 1.8; margin-bottom: 1.6rem; font-style: italic; }
  .testimonial-author { display: flex; align-items: center; gap: .9rem; }
  .author-avatar {
    width: 44px; height: 44px; border-radius: 50%;
    background: linear-gradient(135deg, var(--gold), var(--sage));
    display: flex; align-items: center; justify-content: center;
    font-weight: 600; font-size: .9rem; color: var(--forest);
  }
  .author-info strong { display: block; font-size: .88rem; color: var(--white); font-weight: 500; }
  .author-info span { font-size: .78rem; color: rgba(255,255,255,.5); }
  .stars { color: var(--gold-light); font-size: .9rem; margin-bottom: .4rem; }

  /* ─── EXPERIENCE ─── */
  #experience { background: var(--parchment); }
  .experience-wrap { max-width: 780px; margin: 0 auto; }
  .exp-item {
    display: grid; grid-template-columns: 120px 1fr; gap: 2rem;
    padding: 2rem 0; border-bottom: 1px solid rgba(201,168,76,.2);
  }
  .exp-item:last-child { border-bottom: none; }
  .exp-year { font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; color: var(--gold); font-weight: 600; padding-top: .2rem; }
  .exp-content h4 { font-family: 'Cormorant Garamond', serif; font-size: 1.25rem; font-weight: 600; color: var(--forest); margin-bottom: .3rem; }
  .exp-content p { font-size: .88rem; color: var(--ink-muted); line-height: 1.7; }

  /* ─── CONTACT ─── */
  #contact { background: var(--white); }
  .contact-wrap { display: grid; grid-template-columns: 1fr 1.4fr; gap: 5rem; max-width: 1100px; margin: 0 auto; }

  .contact-info h3 {
    font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; font-weight: 400;
    color: var(--forest); margin-bottom: 1rem;
  }
  .contact-info p { font-size: .92rem; color: var(--ink-muted); line-height: 1.8; margin-bottom: 2rem; }

  .contact-methods { display: flex; flex-direction: column; gap: 1.1rem; }
  .contact-method {
    display: flex; align-items: center; gap: 1rem;
    padding: 1.1rem 1.4rem; border-radius: 3px;
    border: 1px solid rgba(201,168,76,.25); background: var(--parchment);
    text-decoration: none; transition: all .25s;
  }
  .contact-method:hover { border-color: var(--gold); background: var(--gold-pale); }
  .contact-method-icon {
    width: 40px; height: 40px; border-radius: 3px;
    background: var(--forest); display: flex; align-items: center; justify-content: center;
    font-size: 1rem; flex-shrink: 0;
  }
  .contact-method-text strong { display: block; font-size: .85rem; color: var(--forest); font-weight: 500; }
  .contact-method-text span { font-size: .8rem; color: var(--ink-muted); }

  .contact-form { display: flex; flex-direction: column; gap: 1.2rem; }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  .form-group { display: flex; flex-direction: column; gap: .4rem; }
  .form-group label { font-size: .78rem; font-weight: 500; letter-spacing: .06em; text-transform: uppercase; color: var(--ink-muted); }
  .form-group input, .form-group textarea, .form-group select {
    padding: .85rem 1.1rem;
    border: 1.5px solid rgba(201,168,76,.25); border-radius: 3px;
    background: var(--cream); color: var(--ink);
    font-family: 'DM Sans', sans-serif; font-size: .9rem;
    outline: none; transition: border-color .25s, background .25s;
    -webkit-appearance: none;
  }
  .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
    border-color: var(--gold); background: var(--white);
  }
  .form-group textarea { resize: vertical; min-height: 130px; }

  .form-submit {
    background: var(--forest); color: var(--white);
    padding: 1rem 2.4rem; border: none; border-radius: 3px;
    font-family: 'DM Sans', sans-serif; font-size: .9rem; font-weight: 500;
    letter-spacing: .04em; cursor: pointer; transition: all .3s; align-self: flex-start;
  }
  .form-submit:hover { background: var(--gold); color: var(--forest); transform: translateY(-2px); }

  /* ─── FOOTER ─── */
  footer {
    background: var(--ink); color: rgba(255,255,255,.5);
    padding: 3rem 5%;
    display: flex; align-items: center; justify-content: space-between; flex-wrap: gap;
    gap: 1.5rem;
  }
  .footer-logo { font-family: 'Cormorant Garamond', serif; font-size: 1.3rem; color: var(--white); }
  .footer-logo span { color: var(--gold); }
  footer p { font-size: .82rem; }
  .footer-links { display: flex; gap: 1.4rem; }
  .footer-links a { font-size: .82rem; color: rgba(255,255,255,.4); text-decoration: none; transition: color .2s; }
  .footer-links a:hover { color: var(--gold); }

  /* ─── ANIMATIONS ─── */
  .fade-up { opacity: 0; transform: translateY(28px); transition: opacity .7s ease, transform .7s ease; }
  .fade-up.visible { opacity: 1; transform: translateY(0); }

  /* ─── RESPONSIVE ─── */
  @media (max-width: 900px) {
    #home { grid-template-columns: 1fr; padding-top: 6rem; }
    .hero-visual { display: none; }
    .about-grid, .contact-wrap { grid-template-columns: 1fr; }
    .about-visual { display: none; }
    .form-row { grid-templat
               .form-row { grid-template-columns: 1fr; }
  }
</style>
</head>
